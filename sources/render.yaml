services:
  - name: backend
    type: web
    rootDir: sources/backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: APP_LLM_DEFAULT_MODEL
        value: x-ai/grok-4-fast
      - key: JAVA_OPTS
        value: "-Xmx512m"

  - name: frontend
    type: web
    runtime: static
    rootDir: sources/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://chat-vocacional-backend.onrender.com
