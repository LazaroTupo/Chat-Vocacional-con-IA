services:
  - name: backend
    type: web
    rootDir: sources/backend
    plan: free
    region: oregon
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: APP_LLM_DEFAULT_MODEL
        value: x-ai/grok-4-fast
      - key: JAVA_OPTS
        value: "-Xmx512m"

  - name: frontend
    type: web
    rootDir: sources/frontend
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://chat-vocacional-backend.onrender.com
