services:
  - type: web
    name: chat-vocacional-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: APP_LLM_DEFAULT_MODEL
        value: x-ai/grok-4-fast
      - key: JAVA_OPTS
        value: "-Xmx512m"
